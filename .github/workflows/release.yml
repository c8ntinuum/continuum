name: Release binaries

run-name: Build ${{ github.ref_name }} • ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - "release/*"
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  meta:
    name: Compute version metadata
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_tag_ref: ${{ steps.meta.outputs.is_tag_ref }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
    steps:
      - name: Checkout (full history for git describe)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Compute version/tag
        id: meta
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
            is_tag_ref=true
          else
            version="$(git describe --tags --always | sed 's/^v//')"
            tag="v${version}"
            is_tag_ref=false
          fi

          prerelease=false
          publish_latest=false

          if [[ "${is_tag_ref}" != "true" ]]; then
            prerelease=true
          elif [[ "${version}" == *-* ]]; then
            prerelease=true
          elif [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            publish_latest=true
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "is_tag_ref=${is_tag_ref}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: meta
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            os: linux
            arch: amd64
            lib_ext: so
          - runs-on: ubuntu-22.04-arm
            os: linux
            arch: arm64
            lib_ext: so
          - runs-on: macos-15
            os: darwin
            arch: arm64
            lib_ext: dylib

    permissions:
      contents: read
      id-token: write
      attestations: write

    env:
      VERSION: ${{ needs.meta.outputs.version }}
      ASSET_BASENAME: ctmd-${{ needs.meta.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}

      # Makefile knobs
      ROCKSDB_ENABLED: "true"
      ROCKSDB_REQUIRED: "true"
      LEDGER_ENABLED: "true"
      RUST_SP1_FROZEN: "true"
      RUSTUP_TOOLCHAIN: "1.86.0"
      GOFLAGS: "-mod=vendor"

      CARGO_TERM_COLOR: always

      # RocksDB: built from source on all platforms
      ROCKSDB_VERSION: "10.2.1"
      ROCKSDB_SHA256: "d1ddfd3551e649f7e2d180d5a6a006d90cfde56dcfe1e548c58d95b7f1c87049"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache: true
          check-latest: false
          cache-dependency-path: |
            **/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@0b1efabc08b657293548b77fb76cc02d26091c7e # master (no semver releases)
        with:
          toolchain: ${{ env.RUSTUP_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            patchelf \
            curl \
            ca-certificates \
            libsnappy-dev \
            zlib1g-dev \
            libbz2-dev \
            liblz4-dev \
            libzstd-dev \
            libgflags-dev \
            libnuma-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Cache RocksDB (Linux)
        if: matrix.os == 'linux'
        id: cache-rocksdb
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/rocksdb-${{ env.ROCKSDB_VERSION }}
          key: rocksdb-linux-${{ matrix.arch }}-${{ env.ROCKSDB_VERSION }}-v1

      - name: Set RocksDB env from cache (Linux)
        if: matrix.os == 'linux' && steps.cache-rocksdb.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          PREFIX="${RUNNER_TEMP}/rocksdb-${ROCKSDB_VERSION}"
          echo "ROCKSDB_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${PREFIX}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "$GITHUB_ENV"

      - name: Build RocksDB v${{ env.ROCKSDB_VERSION }} from source on Linux
        if: matrix.os == 'linux' && steps.cache-rocksdb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          PREFIX="${RUNNER_TEMP}/rocksdb-${ROCKSDB_VERSION}"
          SRC="${RUNNER_TEMP}/rocksdb-src-${ROCKSDB_VERSION}"

          mkdir -p "${SRC}" "${PREFIX}/include" "${PREFIX}/lib" "${PREFIX}/lib/pkgconfig"

          curl -fsSL --max-redirs 3 "https://github.com/facebook/rocksdb/archive/v${ROCKSDB_VERSION}.tar.gz" -o "${SRC}/rocksdb.tar.gz"
          echo "${ROCKSDB_SHA256}  ${SRC}/rocksdb.tar.gz" | sha256sum -c -
          work="${SRC}/rocksdb"
          mkdir -p "${work}"
          tar -xzf "${SRC}/rocksdb.tar.gz" -C "${work}" --strip-components=1
          cd "${work}"
          export PORTABLE=1

          make -j"$(nproc)" shared_lib
          make gen-pc PREFIX="${PREFIX}" LIBDIR="${PREFIX}/lib"

          # Strip the primary library — must succeed
          strip --strip-unneeded librocksdb.so*

          # Strip optional bundled libs — ignore if absent
          for lib in libgflags.so* libnuma.so* libsnappy.so* liblz4.so* libzstd.so* libbz2.so* libz.so*; do
            if compgen -G "$lib" > /dev/null; then
              strip --strip-unneeded $lib
            fi
          done

          cp -R include/rocksdb "${PREFIX}/include/"
          cp -a librocksdb.so* "${PREFIX}/lib/"
          cp rocksdb.pc "${PREFIX}/lib/pkgconfig/rocksdb.pc"

          echo "ROCKSDB_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${PREFIX}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "$GITHUB_ENV"

      - name: Verify RocksDB links compression libs (Linux)
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          so="${ROCKSDB_PREFIX}/lib/librocksdb.so"
          test -f "$so"
          ldd "$so"
          ldd "$so" | grep -qi snappy
          ldd "$so" | grep -qi zstd
          ldd "$so" | grep -qi lz4
          ldd "$so" | grep -qi bz2
          ldd "$so" | grep -qi 'libz\.so'

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euo pipefail
          brew install snappy zstd lz4 bzip2 zlib gflags

      - name: Cache RocksDB (macOS)
        if: runner.os == 'macOS'
        id: cache-rocksdb-macos
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/rocksdb-${{ env.ROCKSDB_VERSION }}
          key: rocksdb-darwin-${{ matrix.arch }}-${{ env.ROCKSDB_VERSION }}-v1

      - name: Set RocksDB env from cache (macOS)
        if: runner.os == 'macOS' && steps.cache-rocksdb-macos.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          PREFIX="${RUNNER_TEMP}/rocksdb-${ROCKSDB_VERSION}"
          echo "ROCKSDB_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "$GITHUB_ENV"

      - name: Build RocksDB v${{ env.ROCKSDB_VERSION }} from source (macOS)
        if: runner.os == 'macOS' && steps.cache-rocksdb-macos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          PREFIX="${RUNNER_TEMP}/rocksdb-${ROCKSDB_VERSION}"
          SRC="${RUNNER_TEMP}/rocksdb-src-${ROCKSDB_VERSION}"

          mkdir -p "${SRC}" "${PREFIX}/include" "${PREFIX}/lib" "${PREFIX}/lib/pkgconfig"

          curl -fsSL --max-redirs 3 "https://github.com/facebook/rocksdb/archive/v${ROCKSDB_VERSION}.tar.gz" -o "${SRC}/rocksdb.tar.gz"
          echo "${ROCKSDB_SHA256}  ${SRC}/rocksdb.tar.gz" | shasum -a 256 -c -

          work="${SRC}/rocksdb"
          mkdir -p "${work}"
          tar -xzf "${SRC}/rocksdb.tar.gz" -C "${work}" --strip-components=1
          cd "${work}"
          export PORTABLE=1

          make -j"$(sysctl -n hw.ncpu)" shared_lib
          make gen-pc PREFIX="${PREFIX}" LIBDIR="${PREFIX}/lib"

          cp -R include/rocksdb "${PREFIX}/include/"
          cp -a librocksdb*.dylib "${PREFIX}/lib/"
          cp rocksdb.pc "${PREFIX}/lib/pkgconfig/rocksdb.pc"

          echo "ROCKSDB_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "$GITHUB_ENV"

      - name: Verify RocksDB (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          dylib=$(find "${ROCKSDB_PREFIX}/lib" -name 'librocksdb*.dylib' -not -name '*.*.*' | head -1)
          if [[ -z "${dylib}" ]]; then
            echo "::error::No librocksdb dylib found in ${ROCKSDB_PREFIX}/lib"
            ls -la "${ROCKSDB_PREFIX}/lib/"
            exit 1
          fi
          test -f "$dylib"
          otool -L "$dylib"

      - name: Vendor dependencies
        run: |
          set -euo pipefail
          make vendor

      - name: Verify module integrity
        run: |
          set -euo pipefail
          go mod verify

      - name: Patch zondax/hid C sources into vendor
        run: |
          set -euo pipefail
          # go mod vendor omits C source trees; ensure they are present for cgo
          go mod download github.com/zondax/hid@v0.9.2
          MOD_PATH="$(go env GOMODCACHE)/github.com/zondax/hid@v0.9.2"
          DST="vendor/github.com/zondax/hid"
          mkdir -p "${DST}"
          # hidapi/ is needed on all platforms:
          #   linux:  hidapi/libusb/hid.c + hidapi/hidapi/hidapi.h
          #   darwin: hidapi/mac/hid.c    + hidapi/hidapi/hidapi.h
          cp -r "${MOD_PATH}/hidapi" "${DST}/"
          # libusb/ is needed only on Linux (-I./libusb/libusb cgo flag)
          if [[ "${{ matrix.os }}" == "linux" ]]; then
            cp -r "${MOD_PATH}/libusb" "${DST}/"
          fi

      - name: Build (make dist)
        run: |
          set -euo pipefail
          make dist

      - name: Verify dist outputs exist
        run: |
          set -euo pipefail
          make verify-dist
          ls -lah build/dist/bin build/dist/lib
          ls -1 "build/dist/lib/libsp1verifier.${{ matrix.lib_ext }}" >/dev/null

      - name: Package dist tarball
        id: package
        run: |
          set -euo pipefail
          make package-dist ASSET_BASENAME="${ASSET_BASENAME}"
          echo "tarball=dist/${ASSET_BASENAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Smoke test binary
        run: |
          set -euo pipefail
          bin="build/dist/bin/ctmd"
          if [[ "${{ matrix.os }}" == "linux" ]]; then
            export LD_LIBRARY_PATH="build/dist/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          elif [[ "${{ matrix.os }}" == "darwin" ]]; then
            export DYLD_LIBRARY_PATH="build/dist/lib${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}"
          fi
          "${bin}" version
          echo "Smoke test passed"

      - name: Capture toolchain fingerprint
        run: |
          set -euo pipefail
          make reproducibility-env | sed -n '/^{$/,/^}$/p' > "${ASSET_BASENAME}-toolchain.json"

      - name: Attest build provenance (tarball)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: ${{ github.workspace }}/${{ steps.package.outputs.tarball }}

      - name: Upload artifacts (tarball + toolchain)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ env.ASSET_BASENAME }}-toolchain.json
          if-no-files-found: error
          # Shorter retention for branch builds (testing only); full retention for tags
          retention-days: ${{ needs.meta.outputs.is_tag_ref == 'true' && 30 || 7 }}

      - name: Write job summary
        run: |
          set -euo pipefail
          {
            echo "### 📦 ${ASSET_BASENAME}"
            echo
            echo "- Asset: `$(basename "${{ steps.package.outputs.tarball }}")`"
          } >> "$GITHUB_STEP_SUMMARY"

  image:
    name: Publish image ${{ matrix.platform }}
    needs: [meta, build]
    if: needs.meta.outputs.is_tag_ref == 'true'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            platform: linux/amd64
            os: linux
            arch: amd64
          - runs-on: ubuntu-22.04-arm
            platform: linux/arm64
            os: linux
            arch: arm64

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      VERSION: ${{ needs.meta.outputs.version }}
      ASSET_BASENAME: ctmd-${{ needs.meta.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Download matching release tarball
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: release

      - name: Prepare image context from release tarball
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/image-root"
          tar -xzf "release/${ASSET_BASENAME}.tar.gz" -C "${RUNNER_TEMP}/image-root"
          ctx="${RUNNER_TEMP}/image-root/${ASSET_BASENAME}"
          cp docker/ctmd-runtime.Dockerfile "${ctx}/Dockerfile"
          echo "IMAGE_CONTEXT=${ctx}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ env.IMAGE_CONTEXT }}
          file: ${{ env.IMAGE_CONTEXT }}/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Continuum ctmd runtime image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true

      - name: Attest build provenance (image)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: digests-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 30  # match build artifact retention

  merge-image:
    name: Merge multi-platform image
    needs: [meta, image]
    if: needs.meta.outputs.is_tag_ref == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    env:
      VERSION: ${{ needs.meta.outputs.version }}
      PRERELEASE: ${{ needs.meta.outputs.prerelease }}
      PUBLISH_LATEST: ${{ needs.meta.outputs.publish_latest }}
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - name: Download image digest artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create manifest list and tags
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          shopt -s nullglob

          sources=()
          for digest_file in *; do
            sources+=("${REGISTRY_IMAGE}@sha256:${digest_file}")
          done

          if [[ "${#sources[@]}" -eq 0 ]]; then
            echo "No image digests found"
            exit 1
          fi

          tags=("${REGISTRY_IMAGE}:${VERSION}")
          if [[ "${PUBLISH_LATEST}" == "true" && "${VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            tags+=(
              "${REGISTRY_IMAGE}:${major}.${minor}"
              "${REGISTRY_IMAGE}:${major}"
              "${REGISTRY_IMAGE}:latest"
            )
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "index:org.opencontainers.image.description=Continuum ctmd runtime image" \
            "${tag_args[@]}" \
            "${sources[@]}"

          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${VERSION}"

      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          # Pull by digest rather than mutable tag to verify exactly what was pushed
          manifest_digest=$(docker buildx imagetools inspect \
            "${REGISTRY_IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')
          docker run --rm "${REGISTRY_IMAGE}@${manifest_digest}" version
          echo "Docker smoke test passed (digest: ${manifest_digest})"

  release:
    name: Create/Update GitHub Release
    needs: [meta, build, merge-image]
    if: needs.meta.outputs.is_tag_ref == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout (for release note generation)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: release
          pattern: ctmd-*
          merge-multiple: true

      - name: Generate SHA256SUMS for release tarballs
        run: |
          set -euo pipefail
          cd release

          checksums="ctmd-${{ needs.meta.outputs.tag }}-SHA256SUMS.sha256"

          ls -1 *.tar.gz >/dev/null

          sha256sum *.tar.gz | LC_ALL=C sort -k2 > "$checksums"

          echo "Wrote $checksums"
          cat "$checksums"

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.meta.outputs.tag }}
          PRERELEASE: ${{ needs.meta.outputs.prerelease }}
        run: |
          set -euo pipefail

          mapfile -d '' -t assets < <(
            find release -maxdepth 1 -type f \( \
              -name '*.tar.gz' -o \
              -name 'ctmd-*-SHA256SUMS.sha256' -o \
              -name '*-toolchain.json' \
            \) -print0
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No assets found under ./release"
            exit 1
          fi

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — uploading assets..."
            gh release upload "$TAG" --repo "$GH_REPO" "${assets[@]}" --clobber
            exit 0
          fi

          args=(--title "$TAG" --generate-notes)

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease --latest=false)
          fi

          gh release create "$TAG" --repo "$GH_REPO" "${args[@]}" "${assets[@]}"
